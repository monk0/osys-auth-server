server:
  port: 9000

spring:
  application:
    name: osys-auth-server
  
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/osys_auth?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 日志配置
logging:
  level:
    org.springframework.security: DEBUG
    com.osys.auth: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 自定义配置
auth:
  jwt:
    # JWT 签名密钥 (生产环境请使用环境变量注入)
    secret: ${JWT_SECRET:your-256-bit-secret-key-for-development-only}
    access-token-validity: 7200  # 2小时
    refresh-token-validity: 604800  # 7天
  
  sms:
    # 验证码配置
    code-length: 6
    expire-seconds: 300  # 5分钟
    # 限流配置
    send-interval: 60  # 同手机号发送间隔(秒)
    max-daily-count: 10  # 每日最大发送次数
  
  password:
    # 密码策略
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    # BCrypt 强度
    bcrypt-strength: 10
  
  login:
    # 登录失败锁定
    max-fail-attempts: 5
    lock-duration: 900  # 15分钟
